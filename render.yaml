services:
  - type: web
    name: portfolio-builder-api
    runtime: node
    rootDir: server
    buildCommand: npm ci
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false
      - key: AUTH_SECRET
        generateValue: true
      - key: AUTH_TOKEN_TTL_MS
        value: 43200000
      - key: EMAIL_VERIFICATION_TTL_MINUTES
        value: 15
      - key: EMAIL_DELIVERY_MODE
        value: smtp
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_SECURE
        value: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: CORS_ORIGINS
        value: https://sher-singh-1.github.io
